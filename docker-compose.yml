version: "3.9"

services:
  backend:
    build: ./backend
    container_name: hbl-backend
    restart: unless-stopped
    environment:
      - GEOFOX_USER=${GEOFOX_USER}
      - GEOFOX_PASSWORD=${GEOFOX_PASSWORD}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-5000}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      - redis
    networks:
      - hbl-network

  frontend:
    build: ./frontend
    container_name: hbl-frontend
    restart: unless-stopped
    networks:
      - hbl-network

  redis:
    image: redis:7-alpine
    container_name: hbl-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - hbl-network

  nginx:
    build: ./nginx
    container_name: hbl-nginx
    restart: unless-stopped
    ports:
      - "4699:80"
    depends_on:
      - backend
      - frontend
    networks:
      - hbl-network

networks:
  hbl-network:
    driver: bridge

volumes:
  redis-data:
