<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livemap – Hamburg Bus Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/main.css" />

    <!-- CDN statt npm-Pakete – kein Build-Schritt nötig -->
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  </head>
  <body>
    <div id="app">
      <header id="header">
        <div class="header-left">
          <div class="logo">
            <div class="logo-icon">🚌</div>
            <div class="logo-text">Live<span>map</span></div>
          </div>
          <div id="live-badge">
            <span class="pulse-dot"></span>
            <span id="bus-count">–</span> Live-Busse
          </div>
        </div>
        <div class="header-center">
          <div id="search-container">
            <svg class="search-icon" viewBox="0 0 20 20" fill="none">
              <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="search-input" type="text" placeholder="Haltestelle oder Linie suchen…" autocomplete="off" />
            <div id="search-results"></div>
          </div>
        </div>
        <div class="header-right">
          <div id="status-indicator" class="status-connecting">
            <span class="status-dot"></span>
            <span id="status-text">Verbinde…</span>
          </div>
        </div>
      </header>

      <div id="map"></div>

      <div id="side-panel" class="hidden">
        <div id="panel-inner">
          <button id="panel-close">
            <svg viewBox="0 0 16 16" fill="none">
              <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <div id="panel-content"></div>
        </div>
      </div>

      <div id="stats-bar">
        <span id="stats-update">Warte auf Live-Daten…</span>
      </div>
    </div>

    <!-- Kein type="module" – läuft direkt im Browser -->
    <script src="/src/app.js"></script>
  </body>
</html>
